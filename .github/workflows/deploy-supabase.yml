# Optional: one-click backend deploy after a release tag.
# Requires GitHub repo secrets (see VERSIONING.md → Automation).
name: Deploy Supabase

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (tag or branch)"
        required: true
        default: "v1.0.0-beta.1"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify versions
        run: node scripts/check-version-sync.mjs

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push database migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy edge functions
        run: |
          FUNCTIONS=$(node -e "
            const f = require('./supabase/VERSION.json').edge_functions;
            console.log(f.join(' '));
          ")
          for fn in $FUNCTIONS; do
            echo "Deploying $fn..."
            supabase functions deploy "$fn"
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Summary
        run: |
          echo "Deployed ref: ${{ inputs.ref }}"
          echo "App version: $(node -p "require('./package.json').version")"
          echo "Migrations through: $(node -p "require('./supabase/VERSION.json').migrations_through")"
